name: Build Release APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK components
        run: |
          yes | sdkmanager "platforms;android-36"
          yes | sdkmanager "build-tools;36.0.0"
          yes | sdkmanager "ndk;27.0.12077973"
          yes | sdkmanager "cmake;3.22.1"
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Set ANDROID_HOME
        run: echo "ANDROID_HOME=${{ env.ANDROID_HOME }}" >> $GITHUB_ENV

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -storetype PKCS12 \
            -keystore release.keystore \
            -alias jing \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass jing123456 -keypass jing123456 \
            -dname "CN=Jing, OU=Android, O=Jing, L=Unknown, ST=Unknown, C=CN"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Fix gradlew line endings
        run: |
          sed -i 's/\r$//' gradlew
          hexdump -C gradlew | head -3
          file gradlew

      - name: Build Release APK
        run: |
          echo "=== ANDROID_HOME: $ANDROID_HOME"
          echo "=== Building..."
          bash gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tail -80
          echo "=== Build complete, checking outputs ==="
          ls -la app/build/ 2>/dev/null || echo "No build dir"
          ls -la app/build/outputs/ 2>/dev/null || echo "No outputs dir"
          find app/build -name "*.apk" 2>/dev/null || echo "No APK found anywhere"
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Find and rename APK
        run: |
          APK_PATH=$(find app/build/outputs -name "*.apk" -type f | head -1)
          echo "Found APK: $APK_PATH"
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No APK found!"
            exit 1
          fi
          mkdir -p app/build/outputs/apk/release
          cp "$APK_PATH" app/build/outputs/apk/release/jing-camera-release.apk

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v-${{ steps.date.outputs.date }}
          name: 镜 Camera v-${{ steps.date.outputs.date }}
          body: |
            自动构建的 Release 版本
            - 提交: ${{ github.sha }}
            - 分支: ${{ github.ref_name }}
          files: app/build/outputs/apk/release/jing-camera-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
