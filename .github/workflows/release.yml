name: Build Release APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK components
        run: |
          yes | sdkmanager "platforms;android-36"
          yes | sdkmanager "build-tools;36.0.0"
          yes | sdkmanager "ndk;27.0.12077973"
          yes | sdkmanager "cmake;3.22.1"

      - name: Install Gradle 8.11.1
        run: |
          curl -sL "https://mirrors.cloud.tencent.com/gradle/gradle-8.11.1-bin.zip" -o gradle.zip
          unzip -q gradle.zip -d /opt
          echo "/opt/gradle-8.11.1/bin" >> $GITHUB_PATH
          gradle --version

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -storetype PKCS12 \
            -keystore release.keystore \
            -alias jing \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass jing123456 -keypass jing123456 \
            -dname "CN=Jing, OU=Android, O=Jing, L=Unknown, ST=Unknown, C=CN"

      - name: Build Release APK
        run: |
          echo "=== Building with Gradle ==="
          gradle assembleRelease --no-daemon --stacktrace 2>&1 | tee /tmp/build.log | grep -E "(e:|w:|FAILURE|ERROR|error:|FAILED|> Task)" | tail -50
          echo "=== Build complete ==="
          find app/build -name "*.apk" 2>/dev/null || echo "No APK found"
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Rename APK
        run: |
          APK_PATH=$(find app/build/outputs -name "*.apk" -type f | head -1)
          echo "Found APK: $APK_PATH"
          mkdir -p app/build/outputs/apk/release
          cp "$APK_PATH" app/build/outputs/apk/release/jing-camera-release.apk

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v-${{ steps.date.outputs.date }}
          name: 镜 Camera v-${{ steps.date.outputs.date }}
          body: |
            自动构建的 Release 版本
            - 提交: ${{ github.sha }}
            - 分支: ${{ github.ref_name }}
          files: app/build/outputs/apk/release/jing-camera-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
